<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Settings</title>
</head>
<body>
  <!--
    ROUND 1 — output of a single vague prompt:
      "Build me a settings form with validation."
    Accepted as-is, no review, no edits. This is exactly what the AI produced.
  -->

  <form id="settingsForm">
    <h2>Settings</h2>

    Name<br />
    <input id="name" /><br /><br />

    Email<br />
    <input id="email" /><br /><br />

    Password<br />
    <input id="password" type="text" /><br /><br />

    Confirm Password<br />
    <input id="confirm" type="text" /><br /><br />

    <input id="notifications" type="checkbox" />
    Enable notifications
    <br /><br />

    <div id="msg"></div>

    <button type="submit">Save</button>
  </form>

  <script>
    document.getElementById("settingsForm").addEventListener("submit", function (e) {
      e.preventDefault();

      var name = document.getElementById("name").value;
      var email = document.getElementById("email").value;
      var password = document.getElementById("password").value;
      var confirm = document.getElementById("confirm").value;
      var msg = document.getElementById("msg");

      if (name == "" || email == "" || password == "") {
        msg.textContent = "Please fill all fields.";
        return;
      }

      if (password != confirm) {
        msg.textContent = "Passwords do not match.";
        return;
      }

      msg.textContent = "Settings saved!";
    });
  </script>
</body>
</html>
